<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rafael Hideki · Mapa de Viagens</title>
  <meta name="description" content="O mapa das minhas viagens. Explore os lugares por onde passei." />

  <!-- Open Graph (preview bonito ao compartilhar o link) -->
  <meta property="og:title" content="Rafael Hideki · Mapa de Viagens" />
  <meta property="og:description" content="Explore o mapa dos lugares por onde passei." />
  <meta property="og:type" content="website" />

  <!-- Leaflet (mapa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --line: #ececec;
      --accent: #ff6b5a;       /* troque aqui sua cor de acento */
      --accent-dark: #e8553f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }

    /* ---------- HEADER ---------- */
    header { text-align: center; padding: 56px 20px 28px; }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--line);
      background: #f2f2f2;
    }
    .name { font-size: 26px; font-weight: 700; margin-top: 16px; letter-spacing: -0.3px; }
    .bio { color: var(--muted); margin-top: 6px; font-size: 15px; }

    .socials { display: flex; gap: 14px; justify-content: center; margin-top: 20px; }
    .socials a {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--line); transition: all .15s ease;
    }
    .socials a:hover { border-color: var(--text); transform: translateY(-2px); }
    .socials svg { width: 20px; height: 20px; }

    .cta {
      display: inline-block; margin-top: 22px;
      background: var(--accent); color: #fff;
      padding: 12px 26px; border-radius: 999px;
      font-weight: 600; font-size: 15px; transition: background .15s ease;
    }
    .cta:hover { background: var(--accent-dark); }

    /* ---------- STATS ---------- */
    .stats {
      display: flex; justify-content: center; gap: 36px;
      margin: 36px 0 18px; padding: 18px 0;
      border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    }
    .stat { text-align: center; }
    .stat b { display: block; font-size: 24px; font-weight: 700; }
    .stat span { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    /* ---------- MAPA ---------- */
    .map-title { text-align: center; margin: 30px 0 14px; }
    .map-title h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.2px; }
    .map-title p { color: var(--muted); font-size: 14px; margin-top: 4px; }
    #map {
      width: 100%; height: 460px;
      border: 1px solid var(--line); border-radius: 16px;
      overflow: hidden;
    }

    /* popup do pin */
    .leaflet-popup-content-wrapper { border-radius: 12px; }
    .leaflet-popup-content { margin: 0; width: 220px !important; }
    .pop img { width: 100%; height: 130px; object-fit: cover; display: block;
      border-radius: 12px 12px 0 0; }
    .pop .pop-body { padding: 10px 12px 12px; }
    .pop h3 { font-size: 15px; margin: 0; }
    .pop .place-country { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .pop p { font-size: 13px; color: var(--text); margin: 0; }
    .pop a.pop-link { display: inline-block; margin-top: 8px; font-size: 13px;
      font-weight: 600; color: var(--accent-dark); }

    /* ---------- FOOTER ---------- */
    footer { text-align: center; padding: 44px 20px 60px; color: var(--muted); }
    footer .cta { margin-bottom: 18px; }
    footer .small { font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- ===== HEADER ===== -->
    <header>
      <img class="avatar" src="https://picsum.photos/seed/rafael/200/200" alt="Rafael Hideki" />
      <div class="name">Rafael Hideki</div>
      <div class="bio">Colecionando lugares pelo mundo — explore meu mapa 🗺️</div>

      <div class="socials">
        <a href="https://instagram.com/rafaelh1deki" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="https://www.tiktok.com/@rafaelh1deki" target="_blank" rel="noopener" aria-label="TikTok">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.3 2.1 1.5 3.5 3.5 3.7v2.4c-1.2.1-2.4-.2-3.5-.8v5.8c0 3.2-2.6 5.4-5.5 5.4-2.9 0-5-2.2-5-4.9 0-2.8 2.2-4.9 5.1-4.7v2.5c-.4-.1-.8-.1-1.2 0-1.1.2-1.8 1-1.7 2.2.1 1.1 1 1.9 2.1 1.8 1.2-.1 1.9-1 1.9-2.3V3h2.8z"/></svg>
        </a>
        <a href="https://youtube.com/@rafaelh1deki" target="_blank" rel="noopener" aria-label="YouTube">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 12s0-3.6-.5-5.3a2.7 2.7 0 0 0-1.9-1.9C18.9 4.3 12 4.3 12 4.3s-6.9 0-8.6.5A2.7 2.7 0 0 0 1.5 6.7C1 8.4 1 12 1 12s0 3.6.5 5.3a2.7 2.7 0 0 0 1.9 1.9c1.7.5 8.6.5 8.6.5s6.9 0 8.6-.5a2.7 2.7 0 0 0 1.9-1.9C23 15.6 23 12 23 12zM9.8 15.3V8.7l5.7 3.3-5.7 3.3z"/></svg>
        </a>
      </div>

      <a class="cta" href="mailto:contato.rafaelhideki@gmail.com?subject=Proposta%20de%20parceria">Quer fazer parceria?</a>
    </header>

    <!-- ===== STATS ===== -->
    <div class="stats">
      <div class="stat"><b id="stat-cities">–</b><span>Cidades</span></div>
      <div class="stat"><b id="stat-countries">–</b><span>Países</span></div>
    </div>

    <!-- ===== MAPA ===== -->
    <div class="map-title">
      <h2>Meu mapa de viagens</h2>
      <p>Clique nos pontos para ver cada lugar.</p>
    </div>
    <div id="map"></div>

    <!-- ===== FOOTER ===== -->
    <footer>
      <a class="cta" href="mailto:contato.rafaelhideki@gmail.com?subject=Proposta%20de%20parceria">Vamos trabalhar juntos</a>
      <div>Me segue: @rafaelh1deki</div>
      <div class="small">© <span id="year"></span> Rafael Hideki</div>
    </footer>

  </div>

  <!-- dados dos lugares -->
  <script src="places.js"></script>
  <script>
    // ano no rodapé
    document.getElementById("year").textContent = new Date().getFullYear();

    // contadores
    document.getElementById("stat-cities").textContent = PLACES.length;
    document.getElementById("stat-countries").textContent =
      new Set(PLACES.map(p => p.country)).size;

    // mapa (estilo claro/minimalista CartoDB Positron)
    const map = L.map("map", { scrollWheelZoom: false }).setView([20, 0], 2);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: "abcd", maxZoom: 19
    }).addTo(map);

    // pino minimalista (bolinha na cor de acento)
    const accent = getComputedStyle(document.documentElement).getPropertyValue("--accent").trim();
    function dot() {
      return L.divIcon({
        className: "",
        html: `<div style="width:16px;height:16px;border-radius:50%;background:${accent};
               border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
        iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -8]
      });
    }

    const bounds = [];
    PLACES.forEach(p => {
      bounds.push([p.lat, p.lng]);
      const linkHtml = p.link
        ? `<a class="pop-link" href="${p.link}" target="_blank" rel="noopener">Ver post →</a>` : "";
      const imgHtml = p.photo ? `<img src="${p.photo}" alt="${p.city}">` : "";
      const html = `<div class="pop">${imgHtml}<div class="pop-body">
          <h3>${p.city}</h3>
          <div class="place-country">${p.country}</div>
          <p>${p.text || ""}</p>${linkHtml}</div></div>`;
      L.marker([p.lat, p.lng], { icon: dot() }).addTo(map).bindPopup(html);
    });

    if (bounds.length) map.fitBounds(bounds, { padding: [50, 50] });
  </script>
</body>
</html>
